name: Deploy Backend

on: 
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Deploy to Backend EC2
        uses: appleboy/ssh-action@v0.1.10
        with: 
          host: ${{secrets.EC2_HOST_BACKEND}}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/99acres_website
            git pull origin main
            docker stop backend-container || true
            docker rm backend-container || true
            docker rmi 99_backend || true
            docker build -t 99_backend -f backend/Dockerfile backend/
            docker run -d -p 5000:5000 --name backend-container backend