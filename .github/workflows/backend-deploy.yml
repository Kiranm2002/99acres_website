name: Deploy Backend

on: 
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Deploy to Backend EC2
        uses: appleboy/ssh-action@v0.1.10
        with: 
          host: ${{secrets.EC2_HOST_BACKEND}}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
             sudo git config --global --add safe.directory /home/ubuntu/99acres_website
             cd /home/ubuntu/99acres_website
             sudo git fetch origin
             sudo git reset --hard origin/main
             sudo docker stop backend-container || true
             sudo docker rm backend-container || true
             sudo docker rmi 99_backend || true
             sudo docker build --no-cache -t 99_backend -f backend/Dockerfile backend/
             sudo docker run -d -p 5000:5000 --name backend-container 99_backend